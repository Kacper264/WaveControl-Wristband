name: Build & Release ESP32 Firmware

on:
  push:
    branches: [ pre-prod ]
    paths:
      - "src/**"
      - "include/**"
      - "lib/**"
      - "components/**"
      - "platformio.ini"
      - "version.txt"
      - ".github/workflows/**"

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', '**/library.json', '**/library.properties', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Read version from file
        id: version
        run: |
          if [ ! -f version.txt ]; then
            echo "version.txt manquant"
            exit 1
          fi
          VERSION=$(tr -d ' \n' < version.txt)
          if [ -z "$VERSION" ]; then
            echo "Version vide"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build firmware (ESP32)
        run: pio run -e seeed_xiao_esp32s3

      - name: Rename firmware with version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp .pio/build/seeed_xiao_esp32s3/firmware.bin firmware_${VERSION}.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "ESP32 Firmware ${{ steps.version.outputs.version }}"
          files: firmware_${{ steps.version.outputs.version }}.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
